name: DailySparkVibes Content

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bridge:
    name: Execute AI Content Bridge
    runs-on: ubuntu-latest
    timeout-minutes: 60 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py requests

      - name: Run Spark Bridge Script
        env:
          # We only need these two secrets now
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DRAFT_CHANNEL_ID: ${{ secrets.DRAFT_CHANNEL_ID }}
        run: python spark_bridge.py
