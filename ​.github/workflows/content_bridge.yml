name: DailySparkVibes Content Bridge

on:
  schedule:
    # Runs every 6 hours to check for new inputs or keep the bot alive
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allows you to manually start the bot from the GitHub Actions tab

jobs:
  run-bridge:
    name: Execute AI Content Bridge
    runs-on: ubuntu-latest
    
    # Prevents the workflow from running indefinitely and draining minutes
    timeout-minutes: 60 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py huggingface_hub requests

      - name: Run Spark Bridge Script
        env:
          # Mapping GitHub Secrets to Script Environment Variables
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          DRAFT_CHANNEL_ID: ${{ secrets.DRAFT_CHANNEL_ID }}
        # Runs the script. It will listen for your Discord messages
        run: python spark_bridge.py
